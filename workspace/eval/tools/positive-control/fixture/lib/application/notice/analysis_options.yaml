# dddart 생성 폴더 국소 — 호스트 루트 미수정(houserules §3·plugin 경계). analyzer는 가장 가까운
# 상위 옵션을 쓰고 하위가 부모를 *대체*(병합 아님)하므로 include·exclude·rules를 전부 명시한다.
# flutter_lints와 always_specify_types는 충돌하지 않으니 include 유지(flutter_lints는 omit류 비활성·국소가 부모 룰셋 대체). 호스트 루트가 이 폴더를 analyzer: exclude:로 덮으면 루트 analyze에서 무력화된다(G0에서 확인).
include: package:flutter_lints/flutter.yaml
analyzer:
  language:
    strict-raw-types: true
    strict-inference: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
linter:
  rules:
    always_specify_types: true
    always_declare_return_types: true
